# ============================================
# Network Policy - Pod-to-Pod Communication
# ============================================

# Allow frontend to talk to backend only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-policy
  namespace: ideavest-app
spec:
  podSelector:
    matchLabels:
      app: ideavest-frontend
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow to backend service
    - to:
        - podSelector:
            matchLabels:
              app: ideavest-backend
      ports:
        - port: 3000
          protocol: TCP
---
# Backend: allow from frontend + to database only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-policy
  namespace: ideavest-app
spec:
  podSelector:
    matchLabels:
      app: ideavest-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from frontend pods
    - from:
        - podSelector:
            matchLabels:
              app: ideavest-frontend
      ports:
        - port: 3000
          protocol: TCP
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3000
          protocol: TCP
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow to RDS (PostgreSQL)
    - to: []
      ports:
        - port: 5432
          protocol: TCP
---
# Deny all ingress to namespace by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: ideavest-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from nginx ingress controller
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-controller
  namespace: ideavest-app
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx

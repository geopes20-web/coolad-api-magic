apiVersion: apps/v1
kind: Deployment
metadata:
  name: coolad-frontend
  namespace: coolad-app
  labels:
    app: coolad-frontend
    tier: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: coolad-frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: coolad-frontend
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: DOCKERHUB_USERNAME/coolad-frontend:latest
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always

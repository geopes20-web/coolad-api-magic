apiVersion: apps/v1
kind: Deployment
metadata:
  name: ideavest-backend
  namespace: ideavest-app
  labels:
    app: ideavest-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ideavest-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ideavest-backend
        tier: backend
    spec:
      containers:
        - name: backend
          image: shadymo/ideavest-backend:IMAGE_TAG
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ideavest-secrets
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
      restartPolicy: Always

name: "CI/CD - Build, Push & Deploy"

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to Kubernetes?"
        required: false
        default: "no"
      destroy:
        description: "Destroy manifests?"
        required: false
        default: "no"

env:
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
  IMAGE_TAG: ${{ github.sha }}

jobs:

  # ============================================
  # TEST
  # ============================================
  test:
    name: "🧪 Run Tests"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: app-repo/package-lock.json

      - name: Install dependencies
        run: |
          cd app-repo
          npm ci

      - name: Lint
        run: |
          cd app-repo
          npm run lint

      - name: Test
        run: |
          cd app-repo
          npm test

      - name: Build
        run: |
          cd app-repo
          npm run build


  # ============================================
  # BUILD & PUSH
  # ============================================
  build-push:
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    needs: test

    strategy:
      matrix:
        include:
          - service: frontend
            dockerfile: docker/frontend/Dockerfile
          - service: backend
            dockerfile: docker/backend/Dockerfile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push
        uses: docker/build-push-action@v5
        with:
          context: app-repo
          file: app-repo/${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.DOCKERHUB_USERNAME }}/ideavest-${{ matrix.service }}:${{ env.IMAGE_TAG }}
            ${{ env.DOCKERHUB_USERNAME }}/ideavest-${{ matrix.service }}:latest


  # ============================================
  # DEPLOY (OPTIONAL)
  # ============================================
  deploy:
    name: "📦 Deploy to K8s"
    runs-on: ubuntu-latest
    needs: build-push
    if: ${{ github.event.inputs.deploy == 'yes' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update image tags
        run: |
          cd k8s/overlays/dev
          sed -i "s|ideavest-frontend:.*|ideavest-frontend:${{ env.IMAGE_TAG }}|" kustomization.yaml
          sed -i "s|ideavest-backend:.*|ideavest-backend:${{ env.IMAGE_TAG }}|" kustomization.yaml

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "Deploy images ${IMAGE_TAG}"
          git push


  # ============================================
  # DESTROY (OPTIONAL)
  # ============================================
  destroy:
    name: "🗑 Destroy K8s Manifests"
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.destroy == 'yes' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove deployment images
        run: |
          cd k8s/overlays/dev
          sed -i "s|image: .*ideavest-frontend.*|image: removed|" kustomization.yaml
          sed -i "s|image: .*ideavest-backend.*|image: removed|" kustomization.yaml

      - name: Commit & Push Destroy
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --staged --quiet || git commit -m "Destroy manifests"
          git push
